<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hashaam Portfolio</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#050505;
  color:white;
  overflow-x:hidden;
}

/* Neon Gradient Background */
body::before{
  content:'';
  position:fixed;
  width:200%;
  height:200%;
  background:linear-gradient(45deg,#ff00cc,#3333ff,#00ffee,#ffcc00);
  animation:gradientMove 15s infinite linear;
  z-index:-2;
  filter:blur(150px);
  opacity:0.3;
}

@keyframes gradientMove{
  0%{transform:translate(-25%,-25%)}
  50%{transform:translate(25%,25%)}
  100%{transform:translate(-25%,-25%)}
}

/* Glass effect */
.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
}

/* Navbar */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 50px;
  display:flex;
  justify-content:space-between;
  z-index:1000;
}

nav h1{
  font-weight:800;
  font-size:24px;
  background:linear-gradient(90deg,#00ffee,#ff00cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* Sections */
section{
  min-height:100vh;
  padding:120px 10%;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

/* Hero */
.hero h2{
  font-size:60px;
  font-weight:800;
}

.hero span{
  background:linear-gradient(90deg,#00ffee,#ff00cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  margin-top:20px;
  opacity:0.7;
}

/* Cards */
.card{
  padding:30px;
  margin-top:30px;
  transition:0.4s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-10px) scale(1.02);
  box-shadow:0 0 40px rgba(0,255,255,0.3);
}

/* Button */
.btn{
  margin-top:30px;
  display:inline-block;
  padding:15px 30px;
  border-radius:50px;
  background:linear-gradient(90deg,#00ffee,#ff00cc);
  color:black;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
}

/* Footer */
footer{
  text-align:center;
  padding:40px;
  opacity:0.6;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
  <h1>Hashaam</h1>
</nav>

<section class="hero">
  <h2>Hi, I'm <span>Hashaam</span></h2>
  <p>Your original content stays here exactly.</p>
  <div class="btn">View Work</div>
</section>

<section>
  <div class="card glass">
    <h3>About</h3>
    <p>Keep your original text here.</p>
  </div>

  <div class="card glass">
    <h3>Projects</h3>
    <p>Keep your original projects content.</p>
  </div>

  <div class="card glass">
    <h3>Contact</h3>
    <p>Keep your original contact info.</p>
  </div>
</section>

<footer>
  © 2026 Hashaam
</footer>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
// GSAP animations
gsap.from(".hero h2",{y:100,opacity:0,duration:1});
gsap.from(".hero p",{y:50,opacity:0,duration:1,delay:0.3});
gsap.from(".btn",{scale:0,opacity:0,duration:0.5,delay:0.8});

// Scroll animations
gsap.utils.toArray(".card").forEach(card=>{
  gsap.from(card,{
    scrollTrigger:{
      trigger:card,
      start:"top 80%"
    },
    y:100,
    opacity:0,
    duration:1
  });
});

// THREE JS PARTICLES
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true});
renderer.setSize(innerWidth,innerHeight);

const particlesGeometry = new THREE.BufferGeometry();
const particlesCount = 1000;

const posArray = new Float32Array(particlesCount * 3);

for(let i=0;i<particlesCount*3;i++){
  posArray[i]=(Math.random()-0.5)*5;
}

particlesGeometry.setAttribute('position',new THREE.BufferAttribute(posArray,3));

const particlesMaterial = new THREE.PointsMaterial({
  size:0.01,
  color:0x00ffee
});

const particlesMesh = new THREE.Points(particlesGeometry,particlesMaterial);
scene.add(particlesMesh);

camera.position.z=2;

function animate(){
  requestAnimationFrame(animate);
  particlesMesh.rotation.y += 0.001;
  renderer.render(scene,camera);
}
animate();

// Resize fix
addEventListener("resize",()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
