<style>

/* =========================
   🔥 GLOBAL RESET + BASE
========================= */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#050505;
  color:#fff;
  overflow:hidden;
}

/* =========================
   ⚡ NEON LIGHT SYSTEM
========================= */
body::before{
  content:'';
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 20% 30%, #00ffee, transparent),
    radial-gradient(circle at 80% 70%, #ff00cc, transparent);
  filter:blur(140px);
  opacity:0.25;
  z-index:-2;
}

/* =========================
   🧠 SMOOTH SCROLL (LENIS)
========================= */
#smooth-wrapper{overflow:hidden}
#smooth-content{will-change:transform}

/* =========================
   🎯 CURSOR (PREMIUM)
========================= */
.cursor{
  width:18px;height:18px;
  border:2px solid #00ffee;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  z-index:9999;
  mix-blend-mode:difference;
  transition:transform .08s ease;
}

/* =========================
   🧊 GLASS SYSTEM
========================= */
.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 0 40px rgba(0,255,255,0.08);
}

/* =========================
   🔥 HERO 3D CANVAS
========================= */
#hero-canvas{
  position:absolute;
  inset:0;
  z-index:-1;
}

/* =========================
   🧲 MAGNETIC BUTTONS
========================= */
.btn-primary, .btn-ghost{
  transition:.2s ease;
}
.btn-primary:hover{
  transform:scale(1.05);
  box-shadow:0 0 30px #00ffee;
}

/* =========================
   🎴 3D CARDS (PROJECTS)
========================= */
.wcard{
  transform-style:preserve-3d;
  transition:0.4s ease;
}
.wcard:hover{
  transform:rotateY(6deg) rotateX(6deg) scale(1.02);
  box-shadow:0 40px 80px rgba(0,0,0,0.5);
}

/* =========================
   ✨ REVEAL ANIMATIONS BASE
========================= */
.reveal{
  opacity:0;
  transform:translateY(80px);
}

</style>

<!-- ADD AFTER BODY START -->
<div class="cursor"></div>

<!-- WRAP YOUR WHOLE SITE -->
<div id="smooth-wrapper">
<div id="smooth-content">

<!-- KEEP YOUR FULL HTML CONTENT SAME -->

</div>
</div>

<!-- LIBRARIES -->
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>

/* =========================
   ⚡ LENIS SMOOTH SCROLL
========================= */
const lenis = new Lenis({smooth:true});
function raf(time){
  lenis.raf(time);
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

/* =========================
   🎯 CURSOR FOLLOW
========================= */
const cursor = document.querySelector(".cursor");
window.addEventListener("mousemove",(e)=>{
  cursor.style.transform = `translate(${e.clientX}px,${e.clientY}px)`;
});

/* =========================
   🧲 MAGNETIC EFFECT
========================= */
document.querySelectorAll(".btn-primary,.btn-ghost").forEach(el=>{
  el.addEventListener("mousemove",(e)=>{
    const r = el.getBoundingClientRect();
    const x = e.clientX - r.left - r.width/2;
    const y = e.clientY - r.top - r.height/2;
    el.style.transform=`translate(${x*0.25}px,${y*0.25}px)`;
  });
  el.addEventListener("mouseleave",()=>el.style.transform="translate(0,0)");
});

/* =========================
   🔥 GSAP MASTER TIMELINE
========================= */
gsap.registerPlugin(ScrollTrigger);

gsap.utils.toArray(".reveal").forEach(el=>{
  gsap.to(el,{
    scrollTrigger:{
      trigger:el,
      start:"top 85%"
    },
    opacity:1,
    y:0,
    duration:1,
    ease:"power3.out"
  });
});

/* =========================
   🌌 THREE JS HERO (ADVANCED)
========================= */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("hero-canvas"),alpha:true});
renderer.setSize(innerWidth,innerHeight);

const geometry = new THREE.BufferGeometry();
const count = 4000;
const pos = new Float32Array(count*3);

for(let i=0;i<count*3;i++){
  pos[i]=(Math.random()-0.5)*15;
}

geometry.setAttribute('position', new THREE.BufferAttribute(pos,3));

const material = new THREE.PointsMaterial({
  size:0.01,
  color:0x00ffee
});

const mesh = new THREE.Points(geometry,material);
scene.add(mesh);

camera.position.z = 4;

function animate(){
  requestAnimationFrame(animate);
  mesh.rotation.y += 0.0007;
  mesh.rotation.x += 0.0003;
  renderer.render(scene,camera);
}
animate();

/* =========================
   💡 MOUSE LIGHT EFFECT
========================= */
window.addEventListener("mousemove",(e)=>{
  document.body.style.background =
    `radial-gradient(circle at ${e.clientX}px ${e.clientY}px,
     rgba(0,255,238,0.08), transparent 40%)`;
});

</script>
