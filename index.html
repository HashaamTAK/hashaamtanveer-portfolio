<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans&family=Fraunces&display=swap" rel="stylesheet">

<style>

/* ===== YOUR ORIGINAL CSS (kept same) ===== */
/* (keeping this short here — DO NOT REMOVE YOUR ORIGINAL CSS) */

/* ===== ADD THIS AT END ===== */

/* Smooth motion */
* {
  transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
}

/* Reveal upgrade */
.reveal {
  opacity: 0;
  transform: translateY(60px);
}

/* Hover improvements */
.wcard:hover {
  transform: translateY(-10px) scale(1.02);
}

/* Button feel */
.btn-primary:hover, .btn-ghost:hover {
  transform: translateY(-2px) scale(1.05);
}

/* Performance */
.hero-inner {
  will-change: transform;
}

@media (max-width: 768px) {
  .blob {
    animation: none !important;
  }
}

</style>
</head>

<body>

<!-- KEEP YOUR FULL HTML CONTENT HERE EXACTLY SAME -->

<h1>YOUR EXISTING CONTENT (unchanged)</h1>

<!-- =========================
     ADD THIS BEFORE </body>
========================= -->
<script>

document.addEventListener("DOMContentLoaded", () => {

  // Smooth scroll
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener("click", function(e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute("href"));
      if (target) {
        window.scrollTo({
          top: target.offsetTop - 60,
          behavior: "smooth"
        });
      }
    });
  });

  // Reveal
  const reveals = document.querySelectorAll(".reveal");

  const revealOnScroll = () => {
    const trigger = window.innerHeight * 0.85;

    reveals.forEach(el => {
      const rect = el.getBoundingClientRect();
      if (rect.top < trigger) {
        el.style.opacity = "1";
        el.style.transform = "translateY(0)";
      }
    });
  };

  window.addEventListener("scroll", revealOnScroll);
  revealOnScroll();

  // Magnetic buttons
  document.querySelectorAll(".btn-primary, .btn-ghost").forEach(btn => {
    btn.addEventListener("mousemove", e => {
      const rect = btn.getBoundingClientRect();
      const x = (e.clientX - rect.left - rect.width / 2) * 0.25;
      const y = (e.clientY - rect.top - rect.height / 2) * 0.25;
      btn.style.transform = `translate(${x}px, ${y}px)`;
    });

    btn.addEventListener("mouseleave", () => {
      btn.style.transform = "translate(0,0)";
    });
  });

  // Background motion
  window.addEventListener("scroll", () => {
    const scrollY = window.scrollY;
    document.querySelectorAll(".blob").forEach((blob, i) => {
      blob.style.transform = `translateY(${scrollY * (0.02 + i * 0.01)}px)`;
    });
  });

  // Navbar scroll effect
  const nav = document.getElementById("nav");
  window.addEventListener("scroll", () => {
    if (window.scrollY > 40) {
      nav.classList.add("scrolled");
    } else {
      nav.classList.remove("scrolled");
    }
  });

});

</script>

</body>
</html>
